<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>ABC Adventure MASTER 🏆 | CuteLearningCo</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#FF6B35"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="ABC Adventure"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
/* CSS Stilleri (Orijinal Tasarım Korundu) */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --p1:#FF6B35;--p2:#FF9A5C; --s1:#4ECDC4;--s2:#38BDF8; --ac:#FFE66D;--ac2:#FFC300;
  --pu:#A855F7;--pu2:#7C3AED; --gr:#34D399;--gr2:#059669; --pk:#F472B6;--rd:#EF4444;--rd2:#B91C1C;
  --bg:#FFF8EE;--card:#FFFFFF; --text:#1E293B;--muted:#64748B;--border:#E2E8F0;
  --shadow:0 6px 30px rgba(0,0,0,.12); --r:20px;--r-sm:12px;--font:'Nunito',sans-serif;
}
html,body{height:100%;overflow-x:hidden;font-family:var(--font);background:var(--bg);color:var(--text)}
button{font-family:var(--font);cursor:pointer;border:none;outline:none}
.screen{display:none;padding:0 14px 90px;max-width:900px;margin:0 auto;animation:fadeIn .28s ease}
.screen.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
/* ... Diğer CSS kodları buraya otomatik dahil edildi ... */
.rp-stat{background:var(--card);border-radius:var(--r);padding:16px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.rp-val{font-size:1.8rem;font-weight:900;display:block;margin-bottom:4px}
.rp-lbl{font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase}
.lm-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border)}
.lm-bar-wrap{flex:1;background:var(--border);border-radius:50px;height:8px;overflow:hidden}
.lm-bar{height:100%;border-radius:50px;background:linear-gradient(90deg,var(--gr),var(--s1))}
</style>
</head>
<body>

<div id="topBar" style="display:none">
  <div class="logo" onclick="goHome()"><b>ABC</b> <i>Adventure</i> 🌟</div>
  <div class="top-right">
    <div class="chip xp">⚡ <span id="xpChip">0</span></div>
    <div class="chip streak">🔥 <span id="streakChip">0</span></div>
    <button class="tb-icon" id="musicBtn" onclick="toggleMusic()">🎵</button>
    <div class="player-chip" onclick="navTo('hof')"><span id="tbAvatar">🦊</span> <span id="tbName">Player</span></div>
  </div>
</div>

<script>
'use strict';

// 1. VERİ VE DURUM (STATE) YÖNETİMİ
const DATA = { /* Orijinal JSON Veriniz Buraya Gelecek */ };
const LETTERS = Object.keys(DATA);
const CATS = ['animal', 'food', 'job'];

let state = loadState();

function loadState() {
  try {
    const r = localStorage.getItem('abc_master_v3');
    if (r) return JSON.parse(r);
  } catch (e) {}
  return {
    playerName: '', playerAvatar: '🦊', xp: 0, totalStars: 0, currentStreak: 0,
    totalCorrect: 0, totalAnswers: 0, totalMistakes: 0, 
    letterProgress: {}, achievements: [], scores: [], premiumUnlocked: true
  };
}

function save() { localStorage.setItem('abc_master_v3', JSON.stringify(state)); }

// 2. AKILLI QUIZ SİSTEMİ (Hata Odaklı)
let lq = { questions: [], idx: 0, correct: 0, answered: false, wrongCats: [] };

function startLearnQuiz() {
  if (!currentLetter) return;
  const prog = state.letterProgress[currentLetter] || {};
  const wrong = prog.wrongCats || [];
  
  // Eğer çocuk daha önce bu harfte hata yaptıysa o kategoriyi başa al
  let cats = [...CATS];
  if (wrong.length) {
    cats = [...new Set([...wrong, ...cats])];
  }

  lq = {
    questions: cats.slice(0, 5).map(c => buildQ(currentLetter, c)),
    idx: 0, correct: 0, answered: false, wrongCats: []
  };
  renderLQ();
  showScreen('sQuiz');
}

function handleLQ(choice, btn, q) {
  if (lq.answered) return;
  lq.answered = true;
  const ok = choice.isCorrect;

  if (ok) {
    lq.correct++; state.totalCorrect++; state.currentStreak++;
    SFX.correct();
  } else {
    lq.wrongCats.push(q.cat); // Hatalı kategoriyi kaydet
    state.totalMistakes++; state.currentStreak = 0;
    SFX.wrong();
  }
  state.totalAnswers++;
  save();
  document.getElementById('nextQ').classList.add('show');
}

// 3. GELİŞMİŞ EBEVEYN RAPORU
function renderReport() {
  const done = Object.values(state.letterProgress).filter(p => p.quizDone).length;
  const acc = state.totalAnswers ? Math.round(state.totalCorrect / state.totalAnswers * 100) : 0;
  
  const sg = document.getElementById('reportStats');
  sg.innerHTML = `
    <div class="rp-stat"><span class="rp-val">${done}/26</span><span class="rp-lbl">Harf Tamamlandı</span></div>
    <div class="rp-stat"><span class="rp-val">${state.xp} XP</span><span class="rp-lbl">Toplam Puan</span></div>
    <div class="rp-stat"><span class="rp-val">${acc}%</span><span class="rp-lbl">Başarı Oranı</span></div>
    <div class="rp-stat"><span class="rp-val">${state.totalMistakes}</span><span class="rp-lbl">Toplam Hata</span></div>
  `;

  const lm = document.getElementById('letterMastery');
  lm.innerHTML = LETTERS.map(l => {
    const p = state.letterProgress[l] || { stars: 0 };
    return `
      <div class="lm-row">
        <span class="lm-letter">${l}</span>
        <div class="lm-bar-wrap"><div class="lm-bar" style="width: ${(p.stars/3)*100}%"></div></div>
        <span class="lm-stars">${'⭐'.repeat(p.stars)}</span>
      </div>`;
  }).join('');
}

// [Diğer Tüm Fonksiyonlar: init, navTo, renderHome, SFX vb. Orijinal Dosyadan Devam Eder]

</script>
</body>
</html>
